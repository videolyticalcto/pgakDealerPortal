<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Device Monitor - Login & Signup</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #0f111a;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .auth-container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #30363d;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            color: #58a6ff;
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }

        .auth-header .sub {
            color: #8b949e;
            margin: 0;
            font-size: 0.95rem;
        }

        /* Toggle between Login and Signup */
        .toggle-auth {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background-color: #0b0d12;
            padding: 5px;
            border-radius: 8px;
        }

        .toggle-auth button {
            flex: 1;
            padding: 10px;
            border: none;
            background-color: transparent;
            color: #8b949e;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .toggle-auth button.active {
            background-color: #238636;
            color: white;
        }

        .toggle-auth button:hover:not(.active) {
            background-color: #21262d;
        }

        /* Form visibility */
        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #8b949e;
            font-size: 0.95rem;
        }

        .required-star {
            color: #ff4d4d;
            margin-left: 3px;
            font-weight: bold;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #58a6ff;
            outline: none;
            background-color: #0b0d12;
        }
        /* ===== PASSWORD EYE TOGGLE BUTTON ===== */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            width: 100%;
            padding-right: 46px !important;
        }

        .eye-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #8b949e;
            font-size: 18px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            z-index: 2;
        }

        .eye-toggle-btn:hover {
            color: #58a6ff;
        }

        .eye-toggle-btn:focus {
            outline: none;
            color: #58a6ff;
        }

        /* Make eye button bigger on touch devices */
        @media (max-width: 768px) {
            .eye-toggle-btn {
                font-size: 20px;
                padding: 8px;
                right: 8px;
            }
        }


        /* Phone/Email input group with verify button */
        .phone-input-group {
            display: flex;
            gap: 10px;
        }

        .phone-input-group input {
            flex: 1;
        }

        .verify-btn {
            background-color: #58a6ff;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .verify-btn:hover:not(:disabled) {
            background-color: #79c0ff;
        }

        .verify-btn.verified {
            background-color: #00ff99;
            cursor: default;
        }

        .verify-btn.verified:hover {
            background-color: #00ff99;
        }

        .verify-btn.loading {
            opacity: 0.7;
            cursor: wait;
        }

        /* Pincode autocomplete dropdown */
        .pincode-input-wrapper {
            position: relative;
        }

        .pincode-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #21262d;
            border: 1px solid #30363d;
            border-top: none;
            border-radius: 0 0 6px 6px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .pincode-dropdown.show {
            display: block;
        }

        .dropdown-item {
            padding: 12px;
            color: #c9d1d9;
            cursor: pointer;
            border-bottom: 1px solid #30363d;
            transition: all 0.2s ease;
        }

        .dropdown-item:hover {
            background-color: #30363d;
            padding-left: 16px;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item-code {
            font-weight: bold;
            color: #58a6ff;
        }

        .dropdown-item-details {
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: 4px;
        }

        .dropdown-loading {
            padding: 12px;
            text-align: center;
            color: #8b949e;
        }

        .dropdown-empty {
            padding: 12px;
            text-align: center;
            color: #8b949e;
        }

        /* Selected pincode info display */
        .pincode-info {
            background-color: #0b0d12;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            margin-top: 10px;
            font-size: 0.9rem;
            display: none;
        }

        .pincode-info.show {
            display: block;
        }

        .pincode-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: #8b949e;
        }
        .portal-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .portal-logo {
            height: 60px;
            width: auto;
            object-fit: contain;
        }

        .pincode-info-row:last-child {
            margin-bottom: 0;
        }

        .pincode-info-label {
            font-weight: bold;
            color: #58a6ff;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            background-color: #2ea043;
        }

        .submit-btn:disabled {
            background-color: #6e8a14;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .user-type-label {
            display: block;
            margin-bottom: 10px;
            color: #8b949e;
            font-size: 0.95rem;
            font-weight: bold;
        }

        /* Hide distributor code by default */
        .distributor-code-group {
            display: none;
            animation: slideDown 0.3s ease;
        }

        .distributor-code-group.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-note {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.95rem;
        }

        .signup-note a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .signup-note a:hover {
            text-decoration: underline;
        }

        /* OTP Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #161b22;
            padding: 30px;
            border: 1px solid #30363d;
            border-radius: 10px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        .modal-header h3 {
            color: #58a6ff;
            margin: 0 0 20px 0;
            font-size: 1.5rem;
        }

        .modal-body p {
            color: #8b949e;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .otp-input-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .otp-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #21262d;
            color: #c9d1d9;
            border: 2px solid #30363d;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s ease;
        }

        .otp-input:focus {
            border-color: #58a6ff;
            background-color: #0b0d12;
        }

        .otp-input.error {
            border-color: #ff4d4d;
            background-color: #21262d;
        }

        .timer {
            text-align: center;
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .timer.warning {
            color: #ffa657;
            font-weight: bold;
        }

        .timer.expired {
            color: #ff4d4d;
            font-weight: bold;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .modal-btn-submit {
            background-color: #238636;
            color: white;
            flex: 1;
        }

        .modal-btn-submit:hover:not(:disabled) {
            background-color: #2ea043;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(35, 134, 54, 0.3);
        }

        .modal-btn-submit:disabled {
            background-color: #6e8a14;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .modal-btn-cancel {
            background-color: #2d333b;
            color: #c9d1d9;
        }

        .modal-btn-cancel:hover {
            background-color: #3d444c;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
        }

        .success-message {
            color: #00ff99;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
        }

        .resend-link {
            text-align: center;
            margin-top: 15px;
        }

        .resend-link a {
            color: #58a6ff;
            text-decoration: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .resend-link a:hover {
            text-decoration: underline;
        }

        .resend-link a.disabled {
            color: #8b949e;
            cursor: not-allowed;
            text-decoration: none;
        }

        /* Verification Method Toggle */
        .verification-method-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background-color: #0b0d12;
            padding: 5px;
            border-radius: 6px;
        }

        .verification-method-toggle button {
            flex: 1;
            padding: 8px;
            border: none;
            background-color: transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .verification-method-toggle button.active {
            background-color: #238636;
            color: white;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 30px 20px;
            }

            .auth-header h2 {
                font-size: 1.5rem;
            }

            .pincode-dropdown {
                max-height: 250px;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <!-- Header -->
    <!-- <div class="auth-header">
        <h2>🖥 Pgak Dealer Portal</h2>
        <p class="sub">Manage Your Devices</p>
    </div> -->
    <div class="auth-header">
        <h2 class="portal-title">
            <img src="/static/images/logo_dealer.jpeg" class="portal-logo">
            Pgak Dealer Portal
        </h2>
        <p class="sub">Manage Your Devices</p>
    </div>

    <!-- ==================== LOGIN FORM ==================== -->
    <div id="login-section" class="form-section active">
        <form id="login-form" onsubmit="handleLoginSubmit(event)">
            <div class="input-group">
                <label for="login_contact">Email Address or Phone Number</label>
                <input 
                    type="text" 
                    id="login_contact" 
                    name="contact" 
                    placeholder="Enter email or phone number" 
                    required 
                />
            </div>

            <div class="input-group">
                <label for="login_password">Password</label>
                <div class="password-wrapper">
                    <input 
                        type="password" 
                        id="login_password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required 
                    />
                    <button type="button" class="eye-toggle-btn" onclick="togglePassword('login_password', this)" title="Show/Hide Password" aria-label="Toggle password visibility">🔒</button>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="login-btn">Login</button>
        </form>
    </div>

    <!-- ==================== SIGNUP FORM (DEALER/DISTRIBUTOR) ==================== -->
    <div id="signup-section" class="form-section">
        <form id="dealer-signup-form" onsubmit="handleSignupSubmit(event)">
            <input type="hidden" name="status" value="Pending" />

            <div class="input-group">
                <label class="user-type-label">Account Type <span class="required-star">*</span></label>
                <!-- <select id="user_type_select" name="user_type" required onchange="handleUserTypeChange()">
                    <option value="">Select account type</option>
                    <option value="dealer">Dealer</option>
                    <option value="distributor">Distributor</option>
                </select> -->
                <select id="user_type_select" name="user_type" required>
                    <option value="dealer" selected>Dealer</option>
                </select>
            </div>

            <div class="input-group">
                <label for="dealer_full_name">Full Name <span class="required-star">*</span></label>
                <input type="text" id="dealer_full_name" name="full_name" required placeholder="Enter your full name" />
            </div>

            <div class="input-group">
                <label for="dealer_address">Address<span class="required-star">*</span></label>
                <input type="text" id="dealer_address" name="address" required placeholder="Enter your address" />
            </div>

            <div class="input-group">
                <label for="dealer_phone">Phone Number<span class="required-star">*</span></label>
                <div class="phone-input-group">
                    <input type="tel" id="dealer_phone" name="phone_number" required placeholder="Enter your phone number" />
                    <button type="button" class="verify-btn" onclick="sendOTP('phone', 'dealer_phone', this)">Verify</button>
                </div>
            </div>

            <div class="input-group">
                <label for="dealer_email">Email Address<span class="required-star">*</span></label>
                <div class="phone-input-group">
                    <input type="email" id="dealer_email" name="email" required placeholder="Enter your email address" />
                    <button type="button" class="verify-btn" onclick="sendOTP('email', 'dealer_email', this)">Verify</button>
                </div>
            </div>

            <div class="input-group">
                <label for="dealer_gst">GST Number<span class="required-star">*</label>
                <input type="text" id="dealer_gst" name="gst_no" placeholder="Enter your GST Number" />
            </div>

            <div class="input-group">
                <label for="dealer_company">Company Name<span class="required-star">*</label>
                <input type="text" id="dealer_company" name="company_name" placeholder="Enter your Company Name" />
            </div>

            <!-- Enhanced Pincode Input with Autocomplete -->
            <div class="input-group">
                <label for="dealer_pincode" id="pincode_label">Pincode<span class="required-star">*</span></label>
                <div class="pincode-input-wrapper">
                    <input 
                        type="text" 
                        id="dealer_pincode" 
                        name="pincode" 
                        required 
                        placeholder="Enter your pincode" 
                        oninput="handlePincodeInput(event)"
                        autocomplete="off"
                    />
                    <div id="pincode-dropdown" class="pincode-dropdown"></div>
                </div>
                <div id="pincode-info" class="pincode-info"></div>
            </div>

            <!-- Distributor Code - kept in HTML but hidden via CSS (commented out visually but element exists for JS) -->
            <!-- <div class="input-group distributor-code-group" id="distributor-code-group">
                <label for="dealer_code">Distributor Code (Optional for Dealers)</label>
                <input type="text" id="dealer_code" name="distributor_code" placeholder="Enter the distributor code you belong to (optional)" />
            </div> -->

            <!-- Hidden distributor-code-group element so JS references don't break -->
            <div class="input-group distributor-code-group" id="distributor-code-group" style="display:none;">
                <label for="dealer_code">Distributor Code (Optional for Dealers)</label>
                <input type="text" id="dealer_code" name="distributor_code" placeholder="Enter the distributor code you belong to (optional)" />
            </div>

            <div class="input-group">
                <label for="dealer_password">Password<span class="required-star">*</span></label>
                <div class="password-wrapper">
                    <input type="password" id="dealer_password" name="password" required placeholder="Enter your password" />
                    <button type="button" class="eye-toggle-btn" onclick="togglePassword('dealer_password', this)" title="Show/Hide Password" aria-label="Toggle password visibility">🔒</button>
                </div>
            </div>

            <div class="input-group">
                <label for="dealer_confirm_password">Confirm Password<span class="required-star">*</span></label>
                <div class="password-wrapper">
                    <input type="password" id="dealer_confirm_password" name="confirm_password" required placeholder="Confirm your password" />
                    <button type="button" class="eye-toggle-btn" onclick="togglePassword('dealer_confirm_password', this)" title="Show/Hide Password" aria-label="Toggle password visibility">🔒</button>
                </div>
            </div>

            <button type="submit" class="submit-btn">Sign Up</button>
        </form>
    </div>

    <!-- Signup/Login toggle link -->
    <div class="signup-note" id="toggle-note">
        Don't have an account? <a onclick="switchForm('signup')">Sign Up here</a>
    </div>
</div>

<!-- OTP Verification Modal (Enhanced for Both Phone & Email) -->
<div id="otpModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="otpModalTitle">Verify Your Phone Number</h3>
        </div>
        
        <div class="modal-body">
            <!-- Verification Method Toggle -->
            <div class="verification-method-toggle" id="verificationMethodToggle" style="display: none;">
                <button type="button" class="active" onclick="switchVerificationMethod('current')">Sent Now</button>
                <button type="button" onclick="switchVerificationMethod('alternative')">Use Alternative</button>
            </div>
            
            <p id="otpMessage">Enter the 4-digit OTP sent to your phone</p>
            
            <div class="otp-input-group">
                <input type="text" class="otp-input" maxlength="1" placeholder="0" />
                <input type="text" class="otp-input" maxlength="1" placeholder="0" />
                <input type="text" class="otp-input" maxlength="1" placeholder="0" />
                <input type="text" class="otp-input" maxlength="1" placeholder="0" />
            </div>

            <div class="timer" id="otpTimer">Time remaining: <span id="timerValue">300</span>s</div>
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </div>

        <div class="modal-buttons">
            <button type="button" class="modal-btn modal-btn-submit" onclick="verifyOTP()">Verify OTP</button>
            <button type="button" class="modal-btn modal-btn-cancel" onclick="closeOTPModal()">Cancel</button>
        </div>

        <div class="resend-link">
            <a id="resendLink" onclick="resendOTP()" class="disabled">Resend OTP</a>
        </div>
    </div>
</div>

<script>
    // ==================== GLOBAL VARIABLES ====================
    let currentVerificationType = null;  // 'phone' or 'email'
    let currentInputId = null;
    let currentButton = null;
    let otpTimerInterval = null;
    let otpTimerSeconds = 300;
    let canResendOTP = false;
    let verifiedData = {};  // { 'phone': bool, 'email': bool }
    let pincodeDebounceTimer = null;
    let selectedPincodeData = null;
    let previousUserType = null;  // Track previous user type

    // ==================== HANDLE USER TYPE CHANGE ====================
    // function handleUserTypeChange() {
    //     const userType = document.getElementById('user_type_select').value;
        
    //     // If user type actually changed, clear all form data
    //     if (userType !== previousUserType && userType !== '') {
    //         clearFormData();
    //         previousUserType = userType;
    //     }
        
    //     updatePincodeLabel();
    //     toggleDistributorCode();
    // }

    // ==================== CLEAR ALL FORM DATA ====================
    function clearFormData() {
        // Clear all input fields
        document.getElementById('dealer_full_name').value = '';
        document.getElementById('dealer_address').value = '';
        document.getElementById('dealer_phone').value = '';
        document.getElementById('dealer_email').value = '';
        document.getElementById('dealer_gst').value = '';
        document.getElementById('dealer_company').value = '';
        document.getElementById('dealer_pincode').value = '';
        document.getElementById('dealer_code').value = '';
        document.getElementById('dealer_password').value = '';
        document.getElementById('dealer_confirm_password').value = '';
        
        // Reset verification status
        verifiedData = {};
        selectedPincodeData = null;
        
        // Reset verify buttons
        const verifyBtns = document.querySelectorAll('.verify-btn');
        verifyBtns.forEach(btn => {
            btn.textContent = 'Verify';
            btn.classList.remove('verified');
            btn.disabled = false;
        });
        
        // Hide pincode info
        document.getElementById('pincode-info').classList.remove('show');
        document.getElementById('pincode-dropdown').classList.remove('show');
    }

    // ==================== TOGGLE DISTRIBUTOR CODE ====================
    function toggleDistributorCode() {
        const userType = document.getElementById('user_type_select').value;
        const distributorCodeGroup = document.getElementById('distributor-code-group');
        const distributorCodeInput = document.getElementById('dealer_code');
        
        if (userType === 'dealer') {
            distributorCodeGroup.classList.add('show');
            distributorCodeInput.disabled = false;
            distributorCodeInput.required = false;
            distributorCodeInput.placeholder = 'Enter the distributor code you belong to (optional)';
        } else {
            distributorCodeGroup.classList.remove('show');
            distributorCodeInput.disabled = false;
            distributorCodeInput.required = false;
            distributorCodeInput.value = '';
        }
    }

    // ==================== PINCODE AUTOCOMPLETE ====================
    async function handlePincodeInput(event) {
        const input = event.target.value.trim();
        const dropdown = document.getElementById('pincode-dropdown');
        const infoDiv = document.getElementById('pincode-info');

        const userType = document.getElementById('user_type_select').value;
        if (userType === 'distributor') {
            const lastCommaIndex = input.lastIndexOf(',');
            let currentPincode = '';
            
            if (lastCommaIndex !== -1) {
                currentPincode = input.substring(lastCommaIndex + 1).trim();
            } else {
                currentPincode = input;
            }

            infoDiv.classList.remove('show');

            if (currentPincode.length === 0) {
                dropdown.classList.remove('show');
                return;
            }

            clearTimeout(pincodeDebounceTimer);
            pincodeDebounceTimer = setTimeout(async () => {
                await fetchPincodeData(currentPincode);
            }, 300);
        } else {
            selectedPincodeData = null;
            infoDiv.classList.remove('show');

            if (input.length === 0) {
                dropdown.classList.remove('show');
                return;
            }

            clearTimeout(pincodeDebounceTimer);
            pincodeDebounceTimer = setTimeout(async () => {
                await fetchPincodeData(input);
            }, 300);
        }
    }

    async function fetchPincodeData(pincodeInput) {
        const dropdown = document.getElementById('pincode-dropdown');

        try {
            dropdown.innerHTML = '<div class="dropdown-loading">Searching pincodes...</div>';
            dropdown.classList.add('show');

            const response = await fetch('/api/pincode-lookup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pincode: pincodeInput })
            });

            const data = await response.json();

            if (data.status === 'success' && data.data.length > 0) {
                displayPincodeDropdown(data.data);
            } else {
                dropdown.innerHTML = '<div class="dropdown-empty">No pincodes found</div>';
            }
        } catch (error) {
            console.error('Pincode lookup error:', error);
            dropdown.innerHTML = '<div class="dropdown-empty">Error loading pincodes</div>';
        }
    }

    function displayPincodeDropdown(pincodes) {
        const dropdown = document.getElementById('pincode-dropdown');
        dropdown.innerHTML = '';

        pincodes.forEach(pincode => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.innerHTML = `
                <div class="dropdown-item-code">${pincode.pincode}</div>
                <div class="dropdown-item-details">
                    ${pincode.post_office} • ${pincode.districts_name} • ${pincode.state}
                </div>
            `;
            item.onclick = () => selectPincode(pincode);
            dropdown.appendChild(item);
        });

        dropdown.classList.add('show');
    }

    async function selectPincode(pincodeData) {
        const input = document.getElementById('dealer_pincode');
        const dropdown = document.getElementById('pincode-dropdown');
        const infoDiv = document.getElementById('pincode-info');
        const userType = document.getElementById('user_type_select').value;

        if (userType === 'distributor') {
            const currentValue = input.value.trim();
            const lastCommaIndex = currentValue.lastIndexOf(',');
            
            let newValue = '';
            if (lastCommaIndex !== -1) {
                newValue = currentValue.substring(0, lastCommaIndex + 1) + pincodeData.pincode;
            } else {
                newValue = pincodeData.pincode;
            }
            
            input.value = newValue;
            dropdown.classList.remove('show');
            
            displayPincodeInfo(pincodeData);
            setTimeout(() => {
                infoDiv.classList.remove('show');
                input.focus();
            }, 1000);
        } else {
            input.value = pincodeData.pincode;
            selectedPincodeData = pincodeData;
            dropdown.classList.remove('show');

            displayPincodeInfo(pincodeData);
        }
    }

    function displayPincodeInfo(data) {
        const infoDiv = document.getElementById('pincode-info');
        infoDiv.innerHTML = `
            <div class="pincode-info-row">
                <span class="pincode-info-label">Pincode:</span>
                <span>${data.pincode}</span>
            </div>
            <div class="pincode-info-row">
                <span class="pincode-info-label">Post Office:</span>
                <span>${data.post_office}</span>
            </div>
            <div class="pincode-info-row">
                <span class="pincode-info-label">City:</span>
                <span>${data.city || 'N/A'}</span>
            </div>
            <div class="pincode-info-row">
                <span class="pincode-info-label">District:</span>
                <span>${data.districts_name}</span>
            </div>
            <div class="pincode-info-row">
                <span class="pincode-info-label">State:</span>
                <span>${data.state}</span>
            </div>
        `;
        infoDiv.classList.add('show');
    }

    document.addEventListener('click', function(event) {
        const wrapper = document.querySelector('.pincode-input-wrapper');
        if (wrapper && !wrapper.contains(event.target)) {
            document.getElementById('pincode-dropdown').classList.remove('show');
        }
    });

    // ==================== FORM SWITCHING ====================
    function switchForm(formType) {
        const loginSection = document.getElementById('login-section');
        const signupSection = document.getElementById('signup-section');
        const toggleNote = document.getElementById('toggle-note');

        if (formType === 'login') {
            loginSection.classList.add('active');
            signupSection.classList.remove('active');
            toggleNote.innerHTML = "Don't have an account? <a onclick=\"switchForm('signup')\">Sign up here</a>";
        } else {
            loginSection.classList.remove('active');
            signupSection.classList.add('active');
            toggleNote.innerHTML = "Already have an account? <a onclick=\"switchForm('login')\">Login here</a>";
        }
    }

    function updatePincodeLabel() {
        const userType = document.getElementById('user_type_select').value;
        const label = document.getElementById('pincode_label');
        const input = document.getElementById('dealer_pincode');
        
        if (userType === 'distributor') {
            label.innerHTML = 'Pincodes (Separate with commas) <span class="required-star">*</span>';
            input.placeholder = 'Enter pincodes (comma separated)';
        } else {
            label.innerHTML = 'Pincode <span class="required-star">*</span>';
            input.placeholder = 'Enter your pincode';
        }
    }

    // ==================== LOGIN FORM ====================
    async function handleLoginSubmit(event) {
        event.preventDefault();

        const form = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const contact = document.getElementById('login_contact').value.trim();
        const password = document.getElementById('login_password').value;

        if (!contact || !password) {
            alert('Please enter email/phone and password.');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';

        try {
            const formData = new FormData(form);

            const response = await fetch('/login', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.status === 'success') {
                
                window.location.href = data.redirect;
            } else {
                alert(data.message || 'Login failed. Please try again.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Network error. Please try again.');
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        }
    }

    // ==================== SIGNUP FORM (UNIFIED - DEALER & DISTRIBUTOR) ====================
    async function handleSignupSubmit(event) {
        event.preventDefault();

        const userType = document.getElementById('user_type_select').value;

        if (!userType) {
            alert('Please select an account type (Dealer or Distributor)');
            return;
        }

        // Check both phone and email verification
        if (!verifiedData['phone'] || !verifiedData['email']) {
            alert('Please verify both phone number and email address.');
            return;
        }

        if (userType === 'distributor') {
            const pincodeInput = document.getElementById('dealer_pincode').value.trim();
            if (!pincodeInput) {
                alert('Please enter pincodes.');
                return;
            }
        } else {
            if (!selectedPincodeData) {
                alert('Please select a pincode from the dropdown.');
                return;
            }
        }

        const form = document.getElementById('dealer-signup-form');
        const submitBtn = form.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing up...';

        try {
            const formData = new FormData(form);

            const response = await fetch('/signup', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok && data.status === 'success') {
                alert(data.message || 'Sign up successful! Your account is awaiting admin approval.');
                form.reset();
                selectedPincodeData = null;
                verifiedData = {};
                previousUserType = null;
                
                const verifyBtns = form.querySelectorAll('.verify-btn');
                verifyBtns.forEach(btn => {
                    btn.textContent = 'Verify';
                    btn.classList.remove('verified');
                    btn.disabled = false;
                });

                // Safe null-check before accessing classList — element may be hidden/absent
                const pincodeInfo = document.getElementById('pincode-info');
                const distributorCodeGroup = document.getElementById('distributor-code-group');
                if (pincodeInfo) pincodeInfo.classList.remove('show');
                if (distributorCodeGroup) distributorCodeGroup.classList.remove('show');
                
                switchForm('login');
            } else {
                alert(data.message || 'Sign up failed. Please try again.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Network error. Please try again.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign Up';
        }
    }

    // ==================== ENHANCED OTP FUNCTIONALITY ====================
    async function sendOTP(type, inputId, button) {
        const input = document.getElementById(inputId);
        const value = input.value.trim();

        if (!value) {
            alert(`Please enter a ${type === 'phone' ? 'phone number' : 'email'}`);
            return;
        }

        // Validation
        if (type === 'phone') {
            const digitsOnly = value.replace(/\D/g, '');
            if (digitsOnly.length < 10) {
                alert('Please enter a valid 10-digit phone number');
                return;
            }
        } else if (type === 'email') {
            const emailRegex = /^[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}$/;
            if (!emailRegex.test(value)) {
                alert('Please enter a valid email address');
                return;
            }
        }

        button.classList.add('loading');
        button.disabled = true;
        button.textContent = 'Sending...';

        try {
            const endpoint = type === 'phone' ? '/send-otp' : '/send-otp-email';
            const payload = type === 'phone' 
                ? { phone: value }
                : { email: value };

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok && data.status === 'success') {
                currentVerificationType = type;
                currentInputId = inputId;
                currentButton = button;
                openOTPModal(type, value);
                resetOTPTimer();
            } else {
                alert(data.message || `Failed to send OTP. Please try again.`);
                button.classList.remove('loading');
                button.disabled = false;
                button.textContent = 'Verify';
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Network error. Please try again.');
            button.classList.remove('loading');
            button.disabled = false;
            button.textContent = 'Verify';
        }
    }

    function openOTPModal(type, value) {
        const modal = document.getElementById('otpModal');
        const title = document.getElementById('otpModalTitle');
        const message = document.getElementById('otpMessage');
        const typeLabel = type === 'phone' ? 'phone number' : 'email address';
        
        title.textContent = `Verify Your ${typeLabel.split(' ')[1].charAt(0).toUpperCase() + typeLabel.split(' ')[1].slice(1)}`;
        message.textContent = `Enter the 4-digit OTP sent to your ${typeLabel}`;
        
        modal.classList.add('show');
        
        const inputs = document.querySelectorAll('.otp-input');
        inputs[0].focus();

        document.getElementById('errorMessage').textContent = '';
        document.getElementById('successMessage').textContent = '';

        inputs.forEach(input => {
            input.value = '';
            input.classList.remove('error');
        });

        setupOTPInputs();
    }

    function closeOTPModal() {
        const modal = document.getElementById('otpModal');
        modal.classList.remove('show');
        clearInterval(otpTimerInterval);

        if (currentButton) {
            currentButton.classList.remove('loading');
            currentButton.disabled = false;
            currentButton.textContent = 'Verify';
        }
    }

    function setupOTPInputs() {
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text');
                const digits = pasteData.replace(/[^0-9]/g, '').split('');
                
                digits.forEach((digit, i) => {
                    if (i + index < inputs.length) {
                        inputs[i + index].value = digit;
                    }
                });
                
                if (digits.length > 0) {
                    const nextIndex = Math.min(index + digits.length - 1, inputs.length - 1);
                    inputs[nextIndex].focus();
                }
            });
        });
    }

    async function verifyOTP() {
        const inputs = document.querySelectorAll('.otp-input');
        const otp = Array.from(inputs).map(input => input.value).join('');
        const errorMsg = document.getElementById('errorMessage');

        if (otp.length !== 4) {
            errorMsg.textContent = 'Please enter a 4-digit OTP';
            inputs.forEach(input => input.classList.add('error'));
            return;
        }

        const submitBtn = document.querySelector('.modal-btn-submit');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Verifying...';
        errorMsg.textContent = '';

        try {
            const endpoint = currentVerificationType === 'phone' ? '/verify-otp' : '/verify-otp-email';
            const fieldName = currentVerificationType === 'phone' ? 'phone' : 'email';
            const inputElement = document.getElementById(currentInputId);
            const fieldValue = inputElement.value.trim();

            const payload = new URLSearchParams();
            payload.append(fieldName, fieldValue);
            payload.append('otp', otp);

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: payload
            });

            const data = await response.json();

            if (response.ok && data.status === 'success') {
                const successMsg = document.getElementById('successMessage');
                successMsg.textContent = '✓ Verified successfully!';
                inputs.forEach(input => input.classList.remove('error'));
                
                // Mark this verification type as verified
                verifiedData[currentVerificationType] = true;

                if (currentButton) {
                    currentButton.textContent = 'Verified ✓';
                    currentButton.classList.add('verified');
                    currentButton.disabled = true;
                }

                setTimeout(() => {
                    closeOTPModal();
                }, 1500);
            } else {
                errorMsg.textContent = data.message || 'Invalid OTP. Please try again.';
                inputs.forEach(input => {
                    input.classList.add('error');
                    input.value = '';
                });
                inputs[0].focus();
            }
        } catch (error) {
            console.error('Error:', error);
            errorMsg.textContent = 'Network error. Please try again.';
            inputs.forEach(input => input.classList.add('error'));
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Verify OTP';
        }
    }

    function resetOTPTimer() {
        otpTimerSeconds = 300;
        canResendOTP = false;
        
        const resendLink = document.getElementById('resendLink');
        resendLink.classList.add('disabled');

        if (otpTimerInterval) {
            clearInterval(otpTimerInterval);
        }

        otpTimerInterval = setInterval(() => {
            otpTimerSeconds--;
            document.getElementById('timerValue').textContent = otpTimerSeconds;

            const timerDiv = document.getElementById('otpTimer');
            
            if (otpTimerSeconds <= 60) {
                timerDiv.classList.add('warning');
            }
            
            if (otpTimerSeconds <= 0) {
                clearInterval(otpTimerInterval);
                timerDiv.classList.remove('warning');
                timerDiv.classList.add('expired');
                timerDiv.innerHTML = '<span class="expired">OTP expired</span>';
                canResendOTP = true;
                resendLink.classList.remove('disabled');
            }
        }, 1000);
    }

    async function resendOTP() {
        if (!canResendOTP || !currentInputId) return;

        const resendLink = document.getElementById('resendLink');
        const button = currentButton;
        resendLink.textContent = 'Sending...';
        resendLink.classList.add('disabled');

        try {
            const inputElement = document.getElementById(currentInputId);
            const value = inputElement.value.trim();
            const endpoint = currentVerificationType === 'phone' ? '/send-otp' : '/send-otp-email';
            const payload = currentVerificationType === 'phone'
                ? { phone: value }
                : { email: value };

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok && data.status === 'success') {
                resetOTPTimer();
                
                const inputs = document.querySelectorAll('.otp-input');
                inputs.forEach(input => {
                    input.value = '';
                    input.classList.remove('error');
                });
                
                document.getElementById('errorMessage').textContent = '';
                document.getElementById('successMessage').textContent = 'OTP resent successfully!';
                inputs[0].focus();

                setTimeout(() => {
                    document.getElementById('successMessage').textContent = '';
                }, 2000);
            } else {
                resendLink.textContent = 'Resend OTP';
                alert(data.message || 'Failed to resend OTP');
            }
        } catch (error) {
            console.error('Error:', error);
            resendLink.textContent = 'Resend OTP';
            alert('Network error. Please try again.');
        }
    }

    // ==================== PASSWORD EYE TOGGLE ====================
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (!input) return;

        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '👁';
            btn.title = 'Hide Password';
        } else {
            input.type = 'password';
            btn.textContent = '🔒';
            btn.title = 'Show Password';
        }
        // Keep focus on input after toggle
        input.focus();
    }

</script>
