<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}PGAK Dashboard{% endblock %}</title>

    <!-- Base Styles -->
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- jsQR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" async></script>

    <!-- QRCode generator (for print QR) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        {% block sidebar %}{% endblock %}

        <!-- Main Content -->
        <main class="main-content">
            <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle menu">&#9776;</button>
            {% block content %}{% endblock %}
        </main>

        <!-- Sidebar overlay for mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
