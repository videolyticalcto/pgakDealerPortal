{% extends "dealer/base_dealer.html" %}

{% block content %}
<header class="header">
    <div class="header-top">
        <div>
            <h1 class="header-title" id="pageTitle">AI Analytics</h1>
            <p class="header-subtitle" id="pageSubtitle">Manage camera analytics</p>
        </div>
        <div class="dealer-code-container">
            <div class="dealer-code-label">Dealer Code</div>
            <div class="dealer-code-display">
                <code id="dealerCode" class="dealer-code-value">Loading...</code>
                <button class="copy-code-btn" id="copyCodeBtn" onclick="copyDealerCode()" title="Copy code">Copy</button>
            </div>
        </div>
    </div>
</header>
<div class="content" id="content">
    <div id="analyticsView">
        <!-- Header row -->
        <div style="display:flex;justify-content:flex-end;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <span id="analyticsCount" style="background:#eff6ff;color:#1e40af;font-size:13px;font-weight:600;padding:5px 14px;border-radius:20px;display:none;"></span>
                <button onclick="loadAnalyticsData()"
                    style="display:flex;align-items:center;gap:6px;padding:9px 16px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:9px;font-size:13px;font-weight:600;color:#374151;cursor:pointer;"
                    onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#f1f5f9'">
                    <i class="fas fa-sync-alt" id="analyticsRefreshIcon"></i> Refresh
                </button>
                <button onclick="showDiscoveryView()"
                    style="display:flex;align-items:center;gap:6px;padding:9px 16px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:9px;font-size:13px;font-weight:600;color:#374151;cursor:pointer;"
                    onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#f1f5f9'">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
        </div>

        <!-- Search bar -->
        <div style="position:relative;margin-bottom:16px;">
            <i class="fas fa-search" style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:13px;pointer-events:none;"></i>
            <input id="analyticsSearch" type="text" placeholder="Search by cam IP, analytics name, RTSP..." oninput="filterAnalytics()"
                style="width:100%;padding:10px 14px 10px 38px;border:1px solid #d1d5db;border-radius:10px;font-size:13px;outline:none;box-sizing:border-box;"
                onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor='#d1d5db'">
        </div>

        <!-- Error box -->
        <div id="analyticsErrorBox" style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;font-size:13px;color:#b91c1c;margin-bottom:14px;"></div>

        <!-- Table -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Cam IP</th>
                        <th>Analytics Name</th>
                        <th>Camera RTSP</th>
                        <th style="text-align:center;width:180px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="analyticsTableBody">
                    <tr>
                        <td colspan="4" style="text-align:center;padding:48px;color:#9ca3af;">
                            <i class="fas fa-circle-notch fa-spin fa-lg"></i><br><br>Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/dealer/dashboard.js"></script>
{% endblock %}
