{% extends "distributor/base_distributor.html" %}

{% block content %}
<header class="header">
    <div class="header-top">
        <div>
            <h1 class="header-title" id="pageTitle">Dealers</h1>
            <p class="header-subtitle" id="pageSubtitle">Manage your dealers</p>
        </div>
        <div class="distributor-code-container">
            <div class="distributor-code-label">Distributor Code</div>
            <div class="distributor-code-display">
                <code id="distributorCode" class="distributor-code-value">Loading...</code>
                <button class="copy-code-btn" id="copyCodeBtn" onclick="copyDistributorCode()" title="Copy code">Copy</button>
            </div>
        </div>
    </div>
</header>
<div class="content" id="content">
    <div id="dealersView">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Full Name</th>
                        <th>Address</th>
                        <th>Email</th>
                        <th>Phone No</th>
                        <th>Company</th>
                        <th>Code</th>
                        <th>Status</th>
                        <th>Details</th>
                    </tr>
                    <tr style="background: var(--gray-100); border-top: 2px solid var(--gray-200);">
                        <th style="padding: 8px; border: none;">
                            <input type="text" id="searchFullName" placeholder="Search..." style="width: 100%; padding: 6px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 12px;" onkeyup="applyDealerColumnFilters()">
                        </th>
                        <th style="padding: 8px; border: none;">
                            <input type="text" id="searchAddress" placeholder="Search..." style="width: 100%; padding: 6px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 12px;" onkeyup="applyDealerColumnFilters()">
                        </th>
                        <th style="padding: 8px; border: none;">
                            <input type="text" id="searchEmail" placeholder="Search..." style="width: 100%; padding: 6px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 12px;" onkeyup="applyDealerColumnFilters()">
                        </th>
                        <th style="padding: 8px; border: none;">
                            <input type="text" id="searchPhoneNo" placeholder="Search..." style="width: 100%; padding: 6px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 12px;" onkeyup="applyDealerColumnFilters()">
                        </th>
                        <th style="padding: 8px; border: none;">
                            <input type="text" id="searchCompany" placeholder="Search..." style="width: 100%; padding: 6px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 12px;" onkeyup="applyDealerColumnFilters()">
                        </th>
                        <th style="padding: 8px; border: none;">
                            <input type="text" id="searchCode" placeholder="Search..." style="width: 100%; padding: 6px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 12px;" onkeyup="applyDealerColumnFilters()">
                        </th>
                        <th style="padding: 8px; border: none;">
                            <input type="text" id="searchStatus" placeholder="Search..." style="width: 100%; padding: 6px; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 12px;" onkeyup="applyDealerColumnFilters()">
                        </th>
                        <th style="padding: 8px; border: none; text-align: center;">
                            <button onclick="clearDealerColumnFilters()" style="padding: 4px 8px; background: var(--danger); color: white; border: none; border-radius: 4px; font-size: 11px; cursor: pointer;">Clear</button>
                        </th>
                    </tr>
                </thead>
                <tbody id="dealersTable">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px; color: var(--gray-500);">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Mobile Dealer Detail Page -->
<div id="mobileDealerDetailPage" class="mobile-detail-page">
    <div class="mobile-detail-header">
        <button class="mobile-detail-back" id="mobileDealerDetailBackBtn" onclick="closeDealerDetailPage()">&#8592;</button>
        <div class="mobile-detail-title" id="mobileDealerDetailTitle">Dealer Details</div>
    </div>
    <div class="mobile-detail-content" id="mobileDealerDetailContent">
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/distributor/dashboard.js"></script>
{% endblock %}
