{% extends "base.html" %}

{% block title %}Distributor Dashboard{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/distributor.css">
{% endblock %}

{% block sidebar %}
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M13 21H3V3h18v10"></path>
                <path d="M18 13v6m-3-3h6"></path>
            </svg>
            <h2>Distributor Panel</h2>
        </div>
        <p class="sidebar-subtitle">v1.0</p>
    </div>

    <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">D</div>
        <div class="user-name" id="userName">Distributor</div>
    </div>

    <nav class="sidebar-menu">
        <div class="menu-section">
            <a href="{{ url_for('distributor.dashboard') }}" id="dashboardMenu" class="menu-item {% if request.endpoint == 'distributor.dashboard' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
                </svg>
                Dashboard
            </a>
        </div>

        <div class="menu-section">
            <a href="{{ url_for('distributor.dealers_page') }}" id="dealersMenu" class="menu-item {% if request.endpoint == 'distributor.dealers_page' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                Dealers
            </a>

            <a href="{{ url_for('distributor.devices_page') }}" id="devicesMenu" class="menu-item {% if request.endpoint == 'distributor.devices_page' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="2" y1="20" x2="22" y2="20"></line>
                </svg>
                Devices Management
            </a>
        </div>
    </nav>

    <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Logout
        </button>
    </div>
</aside>
{% endblock %}
